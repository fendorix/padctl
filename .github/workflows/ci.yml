name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Build and publish the canonical padctl build image (ADR-019) to GHCR.
  # The image is tagged with the Zig version read from .zigversion. On a
  # push event the job builds and pushes only when that version tag is not
  # already in the registry (manifest-inspect cache check); on a fork
  # pull_request it cannot push, so it builds locally for verification.
  # This job is currently additive — no other job consumes the image yet.
  build-image:
    name: build-image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image reference
        id: img
        run: |
          set -euo pipefail
          ver="$(head -n1 .zigversion | tr -d '[:space:]')"
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/${owner}/padctl-build:${ver}" >> "$GITHUB_OUTPUT"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
      - name: Look up Zig SHA256
        id: sha
        run: |
          set -euo pipefail
          amd64="$(scripts/padctl-docker --print-sha amd64)"
          test -n "$amd64"
          echo "amd64=${amd64}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check whether image tag already exists
        id: exists
        run: |
          set -euo pipefail
          if docker manifest inspect "${{ steps.img.outputs.ref }}" >/dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build and push canonical image
        if: steps.exists.outputs.found == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.img.outputs.ref }}
          build-args: |
            ZIG_VERSION=${{ steps.img.outputs.version }}
            ZIG_SHA256=${{ steps.sha.outputs.amd64 }}

  # Resolve the canonical build image reference from .zigversion (ADR-019).
  # GitHub Actions cannot read a file inside a `container:` expression, so the
  # tag is computed once here and consumed via needs.image-ref.outputs.ref.
  # Mirrors the build-image job's "Resolve image reference" step — .zigversion
  # stays the single source of truth for the Zig version.
  image-ref:
    name: image-ref
    runs-on: ubuntu-22.04
    outputs:
      ref: ${{ steps.img.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image reference
        id: img
        run: |
          set -euo pipefail
          ver="$(head -n1 .zigversion | tr -d '[:space:]')"
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/${owner}/padctl-build:${ver}" >> "$GITHUB_OUTPUT"

  # Build the Lean formal-spec oracle once and publish it as an artifact.
  # The interactive-Lean-oracle DRT suite in src/test/properties/drt_props.zig
  # only runs when formal/lean/.lake/build/bin/oracle exists; without this job
  # every DRT oracle test silently SkipZigTest's in CI (audit F2). The Lean
  # toolchain (elan + lake build) is heavy, so it is built once here and
  # downloaded by the zig-test jobs rather than rebuilt per matrix leg.
  # Cross-workflow artifacts are not reachable via `needs:`, so the oracle is
  # built inside this workflow (not reused from lean.yml).
  lean-oracle:
    name: lean-oracle
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Build Lean oracle
        working-directory: formal/lean
        run: lake build oracle
      - name: Verify oracle binary exists
        run: test -x formal/lean/.lake/build/bin/oracle
      - name: Upload oracle artifact
        uses: actions/upload-artifact@v4
        with:
          name: lean-oracle
          path: formal/lean/.lake/build/bin/oracle
          if-no-files-found: error
          retention-days: 1

  check-matrix:
    name: check / ${{ matrix.os }} / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: [lean-oracle, image-ref, build-image]
    # Run inside the canonical build image (ADR-019): Zig + libusb + kernel
    # headers are baked in, so no setup-zig step or apt install is needed.
    container: ${{ needs.image-ref.outputs.ref }}
    # debian:bookworm-slim links /bin/sh to dash; force bash so run: steps
    # keep their `set -o pipefail` and `| tee` pipelines.
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        name: [default, wasm-false, libusb-false]
        include:
          - name: default
            zig_args: ""
          - name: wasm-false
            zig_args: -Dwasm=false
          - name: libusb-false
            zig_args: -Dlibusb=false
    env:
      # Turn a missing oracle into a hard failure (no silent SkipZigTest) so
      # the formal-spec differential coverage can never regress to skip again.
      # Mirrors the existing PADCTL_TEST_REQUIRE_UHID pattern (e2e.yml).
      PADCTL_TEST_REQUIRE_LEAN: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Download Lean oracle artifact
        uses: actions/download-artifact@v4
        with:
          name: lean-oracle
          path: formal/lean/.lake/build/bin
      - name: Restore oracle executable bit
        run: |
          set -eo pipefail
          chmod +x formal/lean/.lake/build/bin/oracle
          test -x formal/lean/.lake/build/bin/oracle
      # Three separate `zig build` processes (Option C from PR #166 fc4937b)
      # to avoid Zig issue #22453 inter-step flock contention. Each process
      # has its own .zig-cache lock space.
      # NOTE: -j1 was tried (commits 9892e14 + 0e330b9) but caused a separate
      # Zig scheduler deadlock — empirically reproduced in container. The real
      # CI hang was a test-level blocking-pipe issue (TP33), fixed in edf7224.
      # Removing -j1 here.
      - name: Run all checks (serial via separate processes)
        run: |
          set -eo pipefail
          timeout 600 zig build ${{ matrix.zig_args }} test --summary all 2>&1 | tee test.log
          timeout 600 zig build ${{ matrix.zig_args }} test-safe --summary all 2>&1 | tee test-safe.log
          timeout 600 zig build ${{ matrix.zig_args }} check-fmt 2>&1 | tee check-fmt.log

  check:
    name: check
    runs-on: ubuntu-22.04
    needs: [lean-oracle, check-matrix]
    if: ${{ always() }}
    steps:
      - name: Require lean-oracle and check matrix success
        run: |
          if [ "${{ needs.lean-oracle.result }}" != "success" ]; then
            echo "lean-oracle result: ${{ needs.lean-oracle.result }}"
            exit 1
          fi
          if [ "${{ needs.check-matrix.result }}" != "success" ]; then
            echo "check-matrix result: ${{ needs.check-matrix.result }}"
            exit 1
          fi

  tsan:
    name: tsan / ubuntu-22.04
    runs-on: ubuntu-22.04
    needs: [image-ref, build-image]
    # Run inside the canonical build image (ADR-019): Zig + libusb are baked
    # in. gdb is only needed by the failure-only diagnostics step below and is
    # installed there to keep the happy path free of an apt install.
    container: ${{ needs.image-ref.outputs.ref }}
    # debian:bookworm-slim links /bin/sh to dash; force bash so run: steps
    # keep their `set -o pipefail`, `| tee` and `bash -lc` usage.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Run TSAN tests
        run: |
          set -o pipefail
          rm -rf .zig-cache
          export TSAN_OPTIONS="halt_on_error=1:verbosity=1:history_size=7:log_path=$PWD/tsan"
          timeout 600 zig build test-tsan --summary all 2>&1 | tee tsan-build.log
      - name: TSAN diagnostics
        if: failure()
        run: |
          set -euo pipefail
          apt-get update && apt-get install -y --no-install-recommends gdb
          echo "==== TSAN summary from build log ===="
          grep -nE "ThreadSanitizer|data race|thread leak|SUMMARY|signal [0-9]+|terminated with signal|error: while executing test" tsan-build.log || true
          FAILED_CMD="$(grep -E '^\.?/?\.zig-cache/o/.+/test --cache-dir=' tsan-build.log | tail -n 1 || true)"
          if [ -n "${FAILED_CMD}" ]; then
            echo "${FAILED_CMD}" > tsan-failed-cmd.txt
            echo "==== Re-running failed test command once ===="
            bash -lc "${FAILED_CMD}" > tsan-rerun.log 2>&1 || true
            echo "==== Running failed command under gdb ===="
            eval "set -- ${FAILED_CMD}"
            gdb -q -batch \
              -ex "set pagination off" \
              -ex "set confirm off" \
              -ex "run" \
              -ex "thread apply all bt full" \
              --args "$@" > tsan-gdb.log 2>&1 || true
          fi
          echo "==== TSAN log files ===="
          ls -lah tsan* || true
      - name: Upload TSAN logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tsan-logs
          path: |
            tsan-build.log
            tsan-failed-cmd.txt
            tsan-rerun.log
            tsan-gdb.log
            tsan*

  # Compile the musl-static padctl binary once inside the canonical build
  # image (ADR-019) and publish it as an artifact. The distro-check matrix
  # then `docker run`s this binary on pristine debian:12 / fedora:41 images,
  # which stay free of any padctl toolchain so the smoke test reflects a real
  # end-user environment.
  distro-musl-build:
    name: distro-musl-build
    runs-on: ubuntu-22.04
    needs: [image-ref, build-image]
    container: ${{ needs.image-ref.outputs.ref }}
    # debian:bookworm-slim links /bin/sh to dash; force bash for run: steps.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Build musl-static padctl
        run: zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-musl -Dlibusb=false
      - name: Upload musl binary
        uses: actions/upload-artifact@v4
        with:
          name: distro-musl-bin
          path: zig-out/bin/padctl
          if-no-files-found: error
          retention-days: 1

  distro-check:
    name: distro-check / ${{ matrix.name }}
    runs-on: ubuntu-22.04
    # The musl-static binary is built once in the canonical image (ADR-019);
    # this job only `docker run`s it on pristine distros, so it cannot itself
    # be a `container:` job and instead depends on the distro-musl-build
    # artifact.
    needs: [distro-musl-build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-12
            image: debian:12
          - name: fedora-41
            image: fedora:41
    steps:
      - uses: actions/checkout@v4
      - name: Download musl binary
        uses: actions/download-artifact@v4
        with:
          name: distro-musl-bin
          path: zig-out/bin
      - name: Restore binary executable bit
        run: chmod +x zig-out/bin/padctl
      - name: Smoke-test musl binary in container
        # Verifies the musl-static binary actually executes on minimal debian/fedora — catches packaging/loader regressions that zig build test (host-glibc) misses
        env:
          DISTRO_IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/zig-out/bin/padctl:/usr/local/bin/padctl" \
            -v "$PWD/devices:/devices" \
            "$DISTRO_IMAGE" \
            /bin/sh -c "
              set -e
              padctl --version
              padctl --help > /dev/null
              padctl scan --help > /dev/null
              padctl --validate /devices/sony/dualsense.toml
            "

  # Drift-guard (ADR-019): the migrated workflows must build/test only inside
  # the canonical image. Fail if `mlugg/setup-zig` or a `zig-version:` input is
  # reintroduced into any of them. coverage.yml (kcov) and lean.yml are
  # intentionally not migrated and are deliberately excluded from this check.
  drift-guard:
    name: drift-guard
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: No setup-zig in migrated workflows
        run: |
          set -euo pipefail
          migrated="ci.yml e2e.yml validate.yml docs.yml release.yml install-flow.yml"
          status=0
          for wf in $migrated; do
            path=".github/workflows/$wf"
            # Strip comment lines so prose mentioning the action does not trip
            # the guard; match the action ref and the setup-zig input key.
            if grep -nE '^[^#]*(mlugg/setup-zig|zig-version:)' "$path"; then
              echo "ERROR: $path reintroduced a hardcoded Zig toolchain (ADR-019)." >&2
              status=1
            fi
          done
          if [ "$status" -ne 0 ]; then
            echo "Migrated workflows must run inside ghcr.io/.../padctl-build (.zigversion)." >&2
            exit 1
          fi
          echo "drift-guard: all migrated workflows use the canonical image."
