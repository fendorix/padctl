name: install-flow

on: [push, pull_request]

concurrency:
  group: install-flow-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Resolve the canonical build image reference from .zigversion (ADR-019).
  # GitHub Actions cannot read a file inside a `container:` expression, so the
  # tag is computed once here and consumed via needs.image-ref.outputs.ref.
  # Mirrors the image-ref job in ci.yml — .zigversion stays the single source
  # of truth for the Zig version.
  image-ref:
    name: image-ref
    runs-on: ubuntu-22.04
    outputs:
      ref: ${{ steps.img.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image reference
        id: img
        run: |
          set -euo pipefail
          ver="$(head -n1 .zigversion | tr -d '[:space:]')"
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/${owner}/padctl-build:${ver}" >> "$GITHUB_OUTPUT"

  # Compile the padctl binary once inside the canonical build image (ADR-019)
  # and publish it as an artifact. The downstream install/pkg/systemd jobs run
  # on the bare runner so they can `docker run` pristine distro images, which
  # is not possible from inside a `container:` job. A musl-static binary is
  # built so the same artifact runs unchanged on the runner host (older glibc)
  # and inside debian:12 / ubuntu:26.04 test targets.
  build-binary:
    name: build-binary
    runs-on: ubuntu-22.04
    needs: [image-ref]
    container: ${{ needs.image-ref.outputs.ref }}
    # debian:bookworm-slim links /bin/sh to dash; force bash for run: steps.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Build padctl (musl-static, no libusb)
        run: zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-musl -Dlibusb=false
      - name: Upload padctl binaries
        uses: actions/upload-artifact@v4
        with:
          name: padctl-bin
          path: zig-out/bin/
          if-no-files-found: error
          retention-days: 1

  install-sandbox:
    name: install / rootless-docker sandbox
    runs-on: ubuntu-22.04
    needs: [build-binary]
    steps:
      - uses: actions/checkout@v4

      - name: Download padctl binary
        uses: actions/download-artifact@v4
        with:
          name: padctl-bin
          path: zig-out/bin

      - name: Restore binary executable bit
        run: chmod +x zig-out/bin/padctl

      - name: Run install-flow sandbox
        run: |
          set -euo pipefail

          # Stage assets into a directory the container can read
          STAGE="$PWD/_ci_stage"
          mkdir -p "$STAGE/bin"
          cp zig-out/bin/padctl "$STAGE/bin/padctl"
          cp -r devices "$STAGE/devices"
          cp -r mappings "$STAGE/mappings" 2>/dev/null || true

          docker run --rm \
            --privileged \
            -v "$STAGE:/opt/padctl:ro" \
            -v "$PWD:/src:ro" \
            debian:12 \
            /bin/bash -euo pipefail -c '
              # ---- bootstrap ----
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                sudo adduser coreutils procps 2>/dev/null

              # Create test user with passwordless sudo
              useradd -m -s /bin/bash testuser
              echo "testuser ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/testuser

              cp /opt/padctl/bin/padctl /usr/local/bin/padctl
              chmod +x /usr/local/bin/padctl

              # Pre-stage device TOMLs at the installed-package share path.
              # The binary lives at /usr/local/bin/padctl and the install runs
              # from testuser HOME (su - login shell), so install.findDevicesSourceDir
              # finds no source `devices/` near the binary or in cwd — exactly the
              # real deb/AUR scenario where the package already shipped device
              # configs into <prefix>/share/padctl/devices. installDeviceConfigs
              # then takes the "package already shipped" branch and
              # collectAllDeviceEntries scans share_dir, so vader5.toml
              # (block_kernel_drivers=["xpad"]) drives generateDriverBlockRules
              # to emit 61-padctl-driver-block.rules. Without this, no device
              # TOMLs are scanned and the 61 rule is never written.
              mkdir -p /usr/local/share/padctl/devices
              cp -r /opt/padctl/devices/. /usr/local/share/padctl/devices/

              # ---- install ----
              # Run as testuser so SUDO_USER is set when they call sudo padctl install.
              # udevadm/systemctl calls inside padctl will fail silently (no daemon) —
              # that is expected; file installation and ensureUserXdgDirs still execute.
              su - testuser -c "sudo SUDO_USER=testuser SUDO_UID=$(id -u testuser) \
                HOME=/home/testuser \
                /usr/local/bin/padctl install --prefix /usr/local 2>&1"

              # ---- invariant checks ----
              FAIL=0

              check() {
                local desc="$1"; shift
                if eval "$@"; then
                  echo "  PASS: $desc"
                else
                  echo "  FAIL: $desc"
                  FAIL=1
                fi
              }

              echo "=== install invariants ==="

              check "/etc/systemd/user/padctl.service exists" \
                "[ -f /etc/systemd/user/padctl.service ]"

              check "/etc/systemd/user/padctl.service is a regular file (not symlink)" \
                "[ ! -L /etc/systemd/user/padctl.service ]"

              check "/home/testuser/.local/state/padctl exists" \
                "[ -e /home/testuser/.local/state/padctl ]"

              check "/home/testuser/.local/state/padctl is NOT a symlink (issue #139)" \
                "[ ! -L /home/testuser/.local/state/padctl ]"

              check "/home/testuser/.local/state/padctl is a directory (issue #139 v2)" \
                "[ -d /home/testuser/.local/state/padctl ]"

              check "/home/testuser/.local/state/padctl owned by testuser" \
                "[ \"\$(stat -c %U /home/testuser/.local/state/padctl)\" = testuser ]"

              check "/usr/local/bin/padctl installed" \
                "[ -f /usr/local/bin/padctl ]"

              if [ $FAIL -ne 0 ]; then
                echo "=== INSTALL INVARIANTS FAILED ==="
                echo "--- /home/testuser tree ---"
                find /home/testuser -maxdepth 4 2>/dev/null || true
                echo "--- /etc/systemd/user ---"
                ls -la /etc/systemd/user/ 2>/dev/null || true
                exit 1
              fi

              # ---- Scenario A: enabled install => sentinel-gated rule + predicate-true reaches unbind ----
              # Sandbox install: sudo SUDO_USER=testuser ... padctl install --prefix /usr/local
              #   - is_root=true (sudo), destdir="" => staging_mode=false
              #   - detectImmutableOs("")=.none in privileged debian:12 (writable /usr,
              #     no /run/ostree-booted) => effective_immutable=false
              #   - resolveUdevDir(destdir="",prefix="/usr/local",imm=false)
              #     => /usr/local/lib/udev/rules.d  (plan.zig:65-70)
              #   - installWillStartUserService(true,null,"","testuser")=true
              #     => do_enable_systemctl = !staging && true = true  (plan.zig:383)
              #   - shouldProactiveUnbind = do_enable_systemctl && !no_enable = true
              #     => writeServiceSentinel runs (sentinelPath("")=/etc/padctl/service-enabled),
              #        independent of the systemctl --user warn-fail (no user bus)
              #   - device TOMLs pre-staged at /usr/local/share/padctl/devices => vader5
              #     block_kernel_drivers=["xpad"] => 61 rule emitted, sentinel-gated.
              echo "=== sentinel mechanism invariants (Scenario A: enabled install) ==="
              FAIL=0

              # Literal single quotes inside this docker -c argument (the whole
              # script is single-quoted by the host runner shell) would prematurely
              # close the host single-quote and corrupt parsing. Keep every check
              # predicate single-quote-free: the sentinel-gate substring lives in a
              # double-quoted variable and grep -F matches it verbatim.
              SENTINEL=/etc/padctl/service-enabled
              SENTINEL_GATE="test -e ${SENTINEL} && "
              RULE=/usr/local/lib/udev/rules.d/61-padctl-driver-block.rules

              check "61 driver-block rule exists" \
                "[ -f \"\$RULE\" ]"

              check "61 rule unbind is sentinel-gated" \
                "grep -qF -- \"\$SENTINEL_GATE\" \"\$RULE\""

              check "sentinel present after enabled install" \
                "[ -e \"\$SENTINEL\" ]"

              mkdir -p /tmp/fakesys && : > /tmp/fakesys/unbind
              check "predicate-true reaches unbind" \
                "{ [ -e \"\$SENTINEL\" ] && printf %s 1-1:1.0 > /tmp/fakesys/unbind; }; [ -s /tmp/fakesys/unbind ]"

              if [ $FAIL -ne 0 ]; then
                echo "=== SCENARIO A FAILED ==="
                exit 1
              fi

              # ---- Scenario B: --no-enable install => no sentinel => predicate-false skips unbind ----
              su - testuser -c "sudo SUDO_USER=testuser SUDO_UID=$(id -u testuser) \
                HOME=/home/testuser \
                /usr/local/bin/padctl install --prefix /usr/local --no-enable 2>&1"

              echo "=== sentinel mechanism invariants (Scenario B: --no-enable install) ==="
              FAIL=0

              check "61 rule still sentinel-gated after --no-enable" \
                "grep -qF -- \"\$SENTINEL_GATE\" \"\$RULE\""

              check "NO sentinel under --no-enable" \
                "[ ! -e \"\$SENTINEL\" ]"

              : > /tmp/fakesys/unbind
              check "predicate-false skips unbind" \
                "{ [ -e \"\$SENTINEL\" ] && printf %s X > /tmp/fakesys/unbind; }; [ ! -s /tmp/fakesys/unbind ]"

              if [ $FAIL -ne 0 ]; then
                echo "=== SCENARIO B FAILED ==="
                exit 1
              fi

              rm -rf /tmp/fakesys

              # Re-install with enabled so sentinel exists for uninstall to remove (Scenario C)
              su - testuser -c "sudo SUDO_USER=testuser SUDO_UID=$(id -u testuser) \
                HOME=/home/testuser \
                /usr/local/bin/padctl install --prefix /usr/local 2>&1"

              # ---- uninstall ----
              su - testuser -c "sudo SUDO_USER=testuser SUDO_UID=$(id -u testuser) \
                HOME=/home/testuser \
                /usr/local/bin/padctl uninstall --prefix /usr/local 2>&1"

              echo "=== uninstall invariants ==="
              FAIL=0

              check "/usr/local/bin/padctl removed after uninstall" \
                "[ ! -f /usr/local/bin/padctl ]"

              check "/etc/systemd/user/padctl.service removed after uninstall" \
                "[ ! -f /etc/systemd/user/padctl.service ]"

              # ---- Scenario C: uninstall removes the sentinel ----
              check "sentinel removed after uninstall" \
                "[ ! -e /etc/padctl/service-enabled ]"

              # ---- issue #137: uninstall removes the generated driver-block
              # rule symmetrically with 60-padctl.rules (uninstall hygiene). No
              # real USB/xpad in rootless Docker, so the active rebind itself
              # is not exercised here — only the file-removal invariant.
              check "61-padctl-driver-block.rules removed after uninstall" \
                "[ ! -e /usr/local/lib/udev/rules.d/61-padctl-driver-block.rules ]"

              if [ $FAIL -ne 0 ]; then
                echo "=== UNINSTALL INVARIANTS FAILED ==="
                exit 1
              fi

              echo "=== all invariants passed ==="
            '

  pkg-deb-smoke:
    name: pkg / deb structure invariants
    runs-on: ubuntu-22.04
    needs: [build-binary]
    steps:
      - uses: actions/checkout@v4

      - name: Download padctl binary
        uses: actions/download-artifact@v4
        with:
          name: padctl-bin
          path: zig-out/bin

      - name: Restore binary executable bit
        run: chmod +x zig-out/bin/padctl* 2>/dev/null || true

      - name: Stage release tarball (mirror release.yml build job)
        run: |
          set -euo pipefail
          STAGING=padctl-ci-x86_64-linux-musl
          mkdir -p "${STAGING}/bin" "${STAGING}/install"
          for bin in padctl padctl-capture padctl-debug; do
            [ -f "zig-out/bin/${bin}" ] && cp "zig-out/bin/${bin}" "${STAGING}/bin/"
          done
          sudo ./zig-out/bin/padctl install --destdir "$PWD/_install_stage" --prefix /usr --no-enable --no-start
          cp _install_stage/usr/lib/systemd/user/*.service "${STAGING}/install/"
          cp _install_stage/usr/lib/udev/rules.d/*.rules "${STAGING}/install/"
          [ -f _install_stage/usr/bin/padctl-reconnect ] && cp _install_stage/usr/bin/padctl-reconnect "${STAGING}/install/"
          cp -r devices "${STAGING}/"
          cp LICENSE README.md "${STAGING}/"
          tar czf "${STAGING}.tar.gz" "${STAGING}"

      - name: Build .deb (mirror release.yml build-deb job)
        run: |
          set -euo pipefail
          VERSION=0.0.0-ci
          DEB_ARCH=amd64
          TARGET=x86_64-linux-musl
          TARBALL="padctl-ci-${TARGET}.tar.gz"
          PKG="padctl_${VERSION}_${DEB_ARCH}"
          DEST="${PWD}/${PKG}"
          tar -xzf "${TARBALL}"
          SRC="padctl-ci-${TARGET}"

          mkdir -p "${DEST}/DEBIAN"
          for f in control postinst prerm postrm; do
            cp "contrib/deb/DEBIAN-BIN/$f" "${DEST}/DEBIAN/$f"
          done
          chmod 0644 "${DEST}/DEBIAN/control"
          chmod 0755 "${DEST}/DEBIAN/postinst" "${DEST}/DEBIAN/prerm" "${DEST}/DEBIAN/postrm"
          sed -i "s/^Version:.*/Version: ${VERSION}/" "${DEST}/DEBIAN/control"
          sed -i "s/^Architecture:.*/Architecture: ${DEB_ARCH}/" "${DEST}/DEBIAN/control"

          mkdir -p "${DEST}/usr/bin" "${DEST}/usr/lib/systemd/user" \
                   "${DEST}/usr/lib/udev/rules.d" "${DEST}/usr/share/padctl" \
                   "${DEST}/usr/share/doc/padctl"

          for bin in padctl padctl-capture padctl-debug padctl-reconnect; do
            [ -f "${SRC}/bin/${bin}" ] && install -Dm755 "${SRC}/bin/${bin}" "${DEST}/usr/bin/${bin}"
          done
          [ -f "${SRC}/install/padctl-reconnect" ] && install -Dm755 "${SRC}/install/padctl-reconnect" "${DEST}/usr/bin/padctl-reconnect"

          cp "${SRC}/install/"*.service "${DEST}/usr/lib/systemd/user/"
          cp "${SRC}/install/"*.rules "${DEST}/usr/lib/udev/rules.d/"

          cp -r "${SRC}/devices" "${DEST}/usr/share/padctl/"
          install -Dm644 "${SRC}/LICENSE" "${DEST}/usr/share/doc/padctl/copyright"

          dpkg-deb --build --root-owner-group "${DEST}" "${PKG}.deb"

      - name: Verify .deb file layout
        run: |
          set -euo pipefail
          OUT=$(dpkg-deb -c padctl_0.0.0-ci_amd64.deb)
          echo "${OUT}" | grep -q ' \./usr/bin/padctl$' \
            || { echo "FAIL: /usr/bin/padctl missing"; echo "${OUT}"; exit 1; }
          echo "${OUT}" | grep -q ' \./usr/lib/systemd/user/padctl\.service$' \
            || { echo "FAIL: padctl.service missing"; echo "${OUT}"; exit 1; }
          echo "${OUT}" | grep -q ' \./usr/lib/udev/rules\.d/60-padctl\.rules$' \
            || { echo "FAIL: 60-padctl.rules missing"; echo "${OUT}"; exit 1; }
          echo "${OUT}" | grep -q ' \./usr/share/padctl/devices/flydigi/vader5\.toml$' \
            || { echo "FAIL: vader5.toml not under /usr/share/padctl/devices/"; echo "${OUT}"; exit 1; }
          DEVICES=$(echo "${OUT}" | grep -c '^.* \./usr/share/padctl/devices/.\+/.\+\.toml$' || true)
          [ "${DEVICES}" -ge 5 ] \
            || { echo "FAIL: expected >=5 .toml under devices/, got ${DEVICES}"; echo "${OUT}"; exit 1; }
          BROKEN=$(echo "${OUT}" | grep -c '^.* \./usr/share/padctl/[^/]\+/[^/]\+\.toml$' || true)
          [ "${BROKEN}" -eq 0 ] \
            || { echo "FAIL: ${BROKEN} TOMLs at broken layout /usr/share/padctl/<vendor>/ (pre-#217 regression)"; echo "${OUT}"; exit 1; }
          echo "PASS: .deb structure invariants (${DEVICES} device TOMLs under devices/, 0 at broken layout)"

      - name: Install .deb in Debian 12 + runtime invariants
        run: |
          ZON_VER=$(grep -E '^\s*\.version\s*=' build.zig.zon | sed -E 's/.*"([^"]+)".*/\1/')
          docker run --rm -v "$PWD:/work:ro" -e ZON_VER="${ZON_VER}" debian:12 /bin/bash -euo pipefail -c '
            apt-get update -qq
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends systemd file 2>/dev/null

            echo "::group::install"
            dpkg -i /work/padctl_0.0.0-ci_amd64.deb || (apt-get install -fy && dpkg -i /work/padctl_0.0.0-ci_amd64.deb)
            echo "::endgroup::"

            echo "::group::reinstall idempotent"
            dpkg -i /work/padctl_0.0.0-ci_amd64.deb
            echo "::endgroup::"

            echo "::group::file layout"
            test -d /usr/share/padctl/devices || { echo FAIL devices dir missing; exit 1; }
            test -f /usr/share/padctl/devices/flydigi/vader5.toml || { echo FAIL vader5.toml missing; exit 1; }
            test -x /usr/bin/padctl || { echo FAIL padctl bin not executable; exit 1; }
            test -f /usr/lib/systemd/user/padctl.service || { echo FAIL service unit missing; exit 1; }
            test -f /usr/lib/udev/rules.d/60-padctl.rules || { echo FAIL udev rules missing; exit 1; }
            echo "::endgroup::"

            echo "::group::version sync (zon=${ZON_VER})"
            BIN_VER=$(/usr/bin/padctl --version | awk "{print \$2}")
            if [ "${BIN_VER}" != "${ZON_VER}" ]; then
              echo "FAIL: --version reported ${BIN_VER}, expected ${ZON_VER} from build.zig.zon (SSOT path build_options.version is broken)"
              exit 1
            fi
            echo "::endgroup::"

            echo "::group::shipped device TOMLs all parse"
            FAIL=0; TOTAL=0
            for toml in $(find /usr/share/padctl/devices -name "*.toml"); do
              TOTAL=$((TOTAL+1))
              /usr/bin/padctl --validate "$toml" 2>&1 | grep -q ": OK$" || { echo "FAIL validate: $toml"; FAIL=$((FAIL+1)); }
            done
            [ "$FAIL" -eq 0 ] || { echo "FAIL: ${FAIL}/${TOTAL} TOMLs failed --validate"; exit 1; }
            echo "PASS validated ${TOTAL}/${TOTAL}"
            echo "::endgroup::"

            echo "::group::udev rules content (Vader 5 Pro / 8BitDo / input-group fallback)"
            grep -q "37d7.*2401" /usr/lib/udev/rules.d/60-padctl.rules || { echo FAIL vader5 USB VID/PID rule missing; exit 1; }
            grep -q "GROUP=\"input\"" /usr/lib/udev/rules.d/60-padctl.rules || { echo FAIL input-group fallback missing; exit 1; }
            grep -q "TAG+=\"uaccess\"" /usr/lib/udev/rules.d/60-padctl.rules || { echo FAIL uaccess tag missing; exit 1; }
            echo "::endgroup::"

            echo "::group::systemd unit critical fields"
            grep -qE "^ExecStart=/usr/bin/padctl" /usr/lib/systemd/user/padctl.service || { echo FAIL ExecStart wrong; exit 1; }
            grep -qE "^StateDirectory=padctl$" /usr/lib/systemd/user/padctl.service || { echo FAIL StateDirectory wrong; exit 1; }
            # issue #216: NoNewPrivileges/LockPersonality/ProtectClock must be absent from user unit
            grep -qE "^(NoNewPrivileges|LockPersonality|ProtectClock)=" /usr/lib/systemd/user/padctl.service && { echo FAIL incompatible hardening directive present; exit 1; } || echo "PASS no incompatible directives"
            echo "::endgroup::"

            echo "::group::dump subcommand recognized (issue #216 symptom 3)"
            /usr/bin/padctl dump 2>&1 | grep -qiE "unknown argument" && { echo FAIL dump still unknown; exit 1; } || echo "PASS dump recognized"
            echo "::endgroup::"

            echo "::group::scan + list-mappings smoke"
            /usr/bin/padctl scan >/dev/null 2>&1 || { echo FAIL scan crashed; exit 1; }
            /usr/bin/padctl list-mappings >/dev/null 2>&1 || { echo FAIL list-mappings crashed; exit 1; }
            echo "::endgroup::"

            echo "::group::static linkage (no glibc dep)"
            file /usr/bin/padctl | grep -q "statically linked" || { echo FAIL not statically linked; file /usr/bin/padctl; ldd /usr/bin/padctl 2>&1 || true; exit 1; }
            echo "::endgroup::"

            echo "::group::uninstall removes everything"
            apt-get remove -y padctl
            test ! -f /usr/bin/padctl || { echo FAIL bin still present; exit 1; }
            test ! -f /usr/lib/systemd/user/padctl.service || { echo FAIL service still present; exit 1; }
            test ! -f /usr/lib/udev/rules.d/60-padctl.rules || { echo FAIL udev still present; exit 1; }
            echo "::endgroup::"

            echo "::group::purge cleans residual share dir"
            apt-get purge -y padctl
            test ! -d /usr/share/padctl || { echo FAIL share dir not cleaned: $(ls /usr/share/padctl); exit 1; }
            echo "::endgroup::"

            echo "ALL INVARIANTS PASS"
          '

  systemd-hardening:
    name: systemd / unit hardening compat (Ubuntu 26.04 + systemd 259)
    runs-on: ubuntu-22.04
    needs: [build-binary]
    steps:
      - uses: actions/checkout@v4

      - name: Download padctl binary
        uses: actions/download-artifact@v4
        with:
          name: padctl-bin
          path: zig-out/bin

      - name: Restore binary executable bit
        run: chmod +x zig-out/bin/padctl

      - name: Generate user unit from installed binary
        run: |
          set -euo pipefail
          mkdir -p _stage/usr/lib/systemd/user
          sudo ./zig-out/bin/padctl install \
            --destdir "$PWD/_stage" --prefix /usr --no-enable --no-start
          cp _stage/usr/lib/systemd/user/padctl.service /tmp/padctl.service

      - name: Verify no incompatible hardening directives in user unit (issue #216)
        run: |
          set -euo pipefail
          echo "=== generated user unit ==="
          cat /tmp/padctl.service
          echo "=== checking for removed directives ==="
          if grep -E "^(NoNewPrivileges|LockPersonality|ProtectClock)=" /tmp/padctl.service; then
            echo "FAIL: incompatible hardening directive found in user unit (breaks systemd 257+ user scope, issue #216)"
            exit 1
          fi
          echo "PASS: no incompatible hardening directives"

      - name: Verify no SupplementaryGroups in user unit (issues #287/#288)
        run: |
          set -euo pipefail
          # A systemd --user manager runs unprivileged (no CAP_SETGID) and cannot
          # apply SupplementaryGroups=; the directive aborts startup with
          # status=216/GROUP. It must never appear in the user unit.
          if grep -E "^SupplementaryGroups=" /tmp/padctl.service; then
            echo "FAIL: SupplementaryGroups in user unit causes status=216/GROUP (issues #287/#288)"
            exit 1
          fi
          echo "PASS: no SupplementaryGroups in user unit"

      - name: Start generated user unit under a real --user manager (issues #287/#288)
        run: |
          set -euo pipefail
          # Boot systemd in a container, install the GENERATED user unit into a
          # test user's manager, start it, and assert it does NOT fail with
          # status=216/GROUP. Runtime counterpart to the static grep check
          # above and the Zig generation test. The container is started
          # detached with systemd as PID 1 — a backgrounded systemd inside a
          # bash -c does not reliably reach a running state.
          docker build -t padctl-sd-runtime - <<'DOCKERFILE'
          FROM debian:12
          RUN apt-get update -qq \
           && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                systemd systemd-sysv dbus libpam-systemd procps \
           && rm -rf /var/lib/apt/lists/*
          DOCKERFILE

          docker run -d --name sd-runtime --privileged --cgroupns=host \
            --tmpfs /run --tmpfs /run/lock \
            -v /sys/fs/cgroup:/sys/fs/cgroup \
            -v /tmp/padctl.service:/tmp/in.service:ro \
            -e container=docker \
            padctl-sd-runtime /lib/systemd/systemd

          for i in $(seq 1 30); do
            S=$(docker exec sd-runtime systemctl is-system-running 2>/dev/null || true)
            echo "${S}" | grep -qE "running|degraded" && break
            sleep 1
          done

          docker exec sd-runtime /bin/bash -euo pipefail -c '
            # Arch-shape host: the input group EXISTS — exactly the #288
            # scenario where the PR #280 conditional still wrote the line.
            groupadd input
            useradd -m -s /bin/bash tu
            UID_TU=$(id -u tu)
            cp /bin/sh /usr/bin/padctl
            mkdir -p /home/tu/.config/systemd/user
            # The generated unit uses ExecStart=/usr/bin/padctl; swap to a
            # long-running stub so the only failure mode under test is GROUP.
            sed "s#^ExecStart=.*#ExecStart=/bin/sleep 600#" /tmp/in.service \
              > /home/tu/.config/systemd/user/padctl.service
            chown -R tu:tu /home/tu
            loginctl enable-linger tu
            sleep 3
            su - tu -c "XDG_RUNTIME_DIR=/run/user/${UID_TU} systemctl --user daemon-reload"
            su - tu -c "XDG_RUNTIME_DIR=/run/user/${UID_TU} systemctl --user start padctl.service" || true
            sleep 2
            STATUS=$(su - tu -c "XDG_RUNTIME_DIR=/run/user/${UID_TU} systemctl --user show -p ExecMainStatus --value padctl.service")
            ACTIVE=$(su - tu -c "XDG_RUNTIME_DIR=/run/user/${UID_TU} systemctl --user is-active padctl.service" || true)
            echo "ExecMainStatus=${STATUS} ActiveState=${ACTIVE}"
            su - tu -c "XDG_RUNTIME_DIR=/run/user/${UID_TU} systemctl --user --no-pager status padctl.service" || true
            if [ "${STATUS}" = "216" ]; then
              echo "FAIL: user unit exited status=216/GROUP (issues #287/#288)"
              exit 1
            fi
            if [ "${ACTIVE}" != "active" ]; then
              echo "FAIL: user unit did not reach active state"
              exit 1
            fi
            echo "PASS: generated user unit reaches active state, no 216/GROUP"
          '

      - name: Tear down systemd runtime container
        if: always()
        run: docker rm -f sd-runtime 2>/dev/null || true

      - name: systemd-analyze verify in Ubuntu 26.04 (systemd 259)
        run: |
          set -euo pipefail
          docker run --rm \
            -v /tmp/padctl.service:/tmp/padctl.service:ro \
            ubuntu:26.04 \
            /bin/bash -euo pipefail -c '
              apt-get update -qq 2>/dev/null
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends systemd >/dev/null 2>&1
              /lib/systemd/systemd --version 2>/dev/null | head -1
              # stub binary so verify passes executable check
              cp /bin/sh /usr/bin/padctl
              echo "=== systemd-analyze verify ==="
              systemd-analyze verify --man=no /tmp/padctl.service
              echo "PASS: systemd-analyze verify clean"
              echo "=== no incompatible directives ==="
              if grep -E "^(NoNewPrivileges|LockPersonality|ProtectClock)=" /tmp/padctl.service; then
                echo "FAIL: incompatible directive present"
                exit 1
              fi
              echo "PASS: directives absent"
            '
