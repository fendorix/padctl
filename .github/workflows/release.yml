name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # Resolve the canonical build image reference from .zigversion (ADR-019).
  # GitHub Actions cannot read a file inside a `container:` expression, so the
  # tag is computed once here and consumed via needs.image-ref.outputs.ref.
  # Mirrors the image-ref job in ci.yml — .zigversion stays the single source
  # of truth for the Zig version. The image is published by ci.yml's
  # build-image job on push to main, so a release-time pull just works.
  image-ref:
    name: image-ref
    runs-on: ubuntu-22.04
    outputs:
      ref: ${{ steps.img.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image reference
        id: img
        run: |
          set -euo pipefail
          ver="$(head -n1 .zigversion | tr -d '[:space:]')"
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/${owner}/padctl-build:${ver}" >> "$GITHUB_OUTPUT"

  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches build.zig.zon version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          TAG_VER="${TAG#v}"
          ZON_VER=$(grep -E '^\s*\.version\s*=' build.zig.zon | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$TAG_VER" != "$ZON_VER" ]; then
            echo "::error::Tag $TAG (version $TAG_VER) does not match build.zig.zon version $ZON_VER. Bump build.zig.zon before tagging."
            exit 1
          fi
          echo "tag $TAG matches build.zig.zon version $ZON_VER"

      - name: Generate changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          {
            echo "# Changelog — ${TAG}"
            echo
            if [ -n "${PREV}" ]; then
              git log --oneline "${PREV}..${TAG}"
            else
              git log --oneline "${TAG}"
            fi
          } > CHANGELOG.md

      - name: Create release
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "release ${TAG} already exists — skipping create (idempotent re-run)"
          else
            gh release create "${TAG}" --title "${TAG}" --notes-file CHANGELOG.md --draft=false --repo "${{ github.repository }}"
          fi

  gen-install-artifacts:
    runs-on: ubuntu-22.04
    needs: [image-ref]
    # Run inside the canonical build image (ADR-019): Zig + libusb are baked
    # in, so no setup-zig step is needed.
    container: ${{ needs.image-ref.outputs.ref }}
    # debian:bookworm-slim links /bin/sh to dash; force bash for run: steps.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Build native (musl to avoid glibc errno gaps)
        run: zig build -Doptimize=ReleaseSafe -Dlibusb=false -Dtarget=x86_64-linux-musl

      - name: Generate install artifacts
        # The container runs as root, so the previous `sudo` prefix is both
        # unnecessary and unavailable (sudo is not in the canonical image).
        run: ./zig-out/bin/padctl install --destdir "$PWD/staging" --prefix /usr --no-enable --no-start

      - name: Upload install artifacts
        uses: actions/upload-artifact@v4
        with:
          name: install-artifacts
          path: staging/

  build:
    needs: [image-ref, create-release, gen-install-artifacts]
    runs-on: ubuntu-22.04
    # Run inside the canonical build image (ADR-019): Zig + libusb are baked
    # in, so no setup-zig step is needed. `gh` is not in the canonical image
    # and is installed below for the release-upload step.
    container: ${{ needs.image-ref.outputs.ref }}
    # debian:bookworm-slim links /bin/sh to dash; force bash for run: steps.
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        target: [x86_64-linux-musl, aarch64-linux-musl]

    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        # gh is required by the "Upload tarball" step but is not in the
        # canonical image; install it from GitHub's apt repository.
        run: |
          set -euo pipefail
          mkdir -p -m 755 /etc/apt/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            -o /etc/apt/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            > /etc/apt/sources.list.d/github-cli.list
          apt-get update
          apt-get install -y --no-install-recommends gh

      - name: Download install artifacts
        uses: actions/download-artifact@v4
        with:
          name: install-artifacts
          path: staging/

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }} -Dlibusb=false

      - name: Package
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          ARCHIVE=padctl-${TAG}-${TARGET}.tar.gz
          STAGING=padctl-${TAG}-${TARGET}
          mkdir -p "${STAGING}/bin" "${STAGING}/install"
          for bin in padctl padctl-capture padctl-debug; do
            [ -f "zig-out/bin/${bin}" ] && cp "zig-out/bin/${bin}" "${STAGING}/bin/"
          done
          cp staging/usr/lib/systemd/user/*.service "${STAGING}/install/"
          cp staging/usr/lib/udev/rules.d/*.rules "${STAGING}/install/"
          [ -f staging/usr/bin/padctl-reconnect ] && cp staging/usr/bin/padctl-reconnect "${STAGING}/install/"
          cp -r devices "${STAGING}/"
          cp LICENSE README.md "${STAGING}/"
          tar czf "${ARCHIVE}" "${STAGING}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload tarball
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${TAG}" "${{ env.ARCHIVE }}" --clobber --repo "${{ github.repository }}"

      - name: Upload artifact for checksums
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  build-deb:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-linux-musl
            deb_arch: amd64
          - target: aarch64-linux-musl
            deb_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: archive-${{ matrix.target }}

      - name: Build .deb
        env:
          TAG: ${{ github.ref_name }}
          DEB_ARCH: ${{ matrix.deb_arch }}
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${TAG#v}"
          TARBALL="padctl-${TAG}-${TARGET}.tar.gz"
          PKG="padctl_${VERSION}_${DEB_ARCH}"
          DEST="${PWD}/${PKG}"

          tar -xzf "${TARBALL}"
          SRC="padctl-${TAG}-${TARGET}"

          mkdir -p "${DEST}/DEBIAN"
          for f in control postinst prerm postrm; do
            cp "contrib/deb/DEBIAN-BIN/$f" "${DEST}/DEBIAN/$f"
          done
          chmod 0644 "${DEST}/DEBIAN/control"
          chmod 0755 "${DEST}/DEBIAN/postinst" "${DEST}/DEBIAN/prerm" "${DEST}/DEBIAN/postrm"
          sed -i "s/^Version:.*/Version: ${VERSION}/" "${DEST}/DEBIAN/control"
          sed -i "s/^Architecture:.*/Architecture: ${DEB_ARCH}/" "${DEST}/DEBIAN/control"

          mkdir -p "${DEST}/usr/bin" "${DEST}/usr/lib/systemd/user" \
                   "${DEST}/usr/lib/udev/rules.d" "${DEST}/usr/share/padctl" \
                   "${DEST}/usr/share/doc/padctl"

          for bin in padctl padctl-capture padctl-debug padctl-reconnect; do
            [ -f "${SRC}/bin/${bin}" ] && install -Dm755 "${SRC}/bin/${bin}" "${DEST}/usr/bin/${bin}"
          done
          [ -f "${SRC}/install/padctl-reconnect" ] && install -Dm755 "${SRC}/install/padctl-reconnect" "${DEST}/usr/bin/padctl-reconnect"

          cp "${SRC}/install/"*.service "${DEST}/usr/lib/systemd/user/"
          cp "${SRC}/install/"*.rules "${DEST}/usr/lib/udev/rules.d/"

          cp -r "${SRC}/devices" "${DEST}/usr/share/padctl/"
          install -Dm644 "${SRC}/LICENSE" "${DEST}/usr/share/doc/padctl/copyright"

          dpkg-deb --build --root-owner-group "${DEST}" "${PKG}.deb"
          echo "DEB=${PKG}.deb" >> "$GITHUB_ENV"

      - name: Upload .deb
        env:
          TAG: ${{ github.ref_name }}
          DEB_ARCH: ${{ matrix.deb_arch }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${TAG}" "${{ env.DEB }}" --clobber --repo "${{ github.repository }}"
          cp "${{ env.DEB }}" "padctl_${DEB_ARCH}.deb"
          gh release upload "${TAG}" "padctl_${DEB_ARCH}.deb" --clobber --repo "${{ github.repository }}"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.deb_arch }}
          path: ${{ env.DEB }}

  verify-release-artifact:
    needs: [build-deb]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - deb_arch: amd64
    steps:
      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: deb-${{ matrix.deb_arch }}

      - name: Install and smoke-test inside debian:12
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          DEB=$(ls padctl_*_${{ matrix.deb_arch }}.deb | head -1)
          docker run --rm -v "$PWD/$DEB:/pkg/$DEB" debian:12 bash -c "
            set -e
            apt-get update -qq
            apt-get install -y /pkg/$DEB
            padctl --version | grep -F '${VERSION}'
            padctl list-mappings
            padctl --validate /usr/share/padctl/devices/sony/dualsense.toml
            test -d /usr/share/padctl/devices/
          "

  checksums:
    needs: [build, build-deb, verify-release-artifact]
    runs-on: ubuntu-latest

    steps:
      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          pattern: archive-*
          merge-multiple: true

      - name: Download debs
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        run: sha256sum padctl-*.tar.gz padctl_*.deb > SHA256SUMS.txt

      - name: Upload checksums
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${TAG}" SHA256SUMS.txt --clobber --repo "${{ github.repository }}"

      - name: Upload SHA256SUMS artifact
        uses: actions/upload-artifact@v4
        with:
          name: sha256sums
          path: SHA256SUMS.txt

  update-aur:
    needs: checksums
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') }}

    steps:
      - uses: actions/checkout@v4

      - name: Download SHA256SUMS
        uses: actions/download-artifact@v4
        with:
          name: sha256sums

      - name: Setup SSH
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "${AUR_SSH_KEY}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo "Host aur.archlinux.org" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/aur" >> ~/.ssh/config
          echo "  User aur" >> ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

      - name: Update padctl-bin PKGBUILD
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          X86_HASH=$(grep "x86_64-linux-musl" SHA256SUMS.txt | awk '{print $1}')
          ARM_HASH=$(grep "aarch64-linux-musl" SHA256SUMS.txt | awk '{print $1}')

          git clone ssh://aur@aur.archlinux.org/padctl-bin.git /tmp/padctl-bin
          cd /tmp/padctl-bin

          cp "${GITHUB_WORKSPACE}/contrib/aur/padctl-bin/PKGBUILD" PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${X86_HASH}')/" PKGBUILD
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${ARM_HASH}')/" PKGBUILD

          HOST_UID=$(id -u)
          docker run --rm -v "$PWD:/pkg" archlinux:latest bash -c \
            "pacman -Sy --noconfirm pacman-contrib fakeroot binutils namcap && useradd -m -u ${HOST_UID} builder && su builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO && namcap PKGBUILD'"
          sudo chown -R "$(id -u):$(id -g)" /tmp/padctl-bin || true

          # --global writes to ~/.gitconfig (runner home), not .git/config which may be owned by builder uid
          git config --global user.name "bananasjim"
          git config --global user.email "bananasjim1@gmail.com"
          git add PKGBUILD .SRCINFO
          git commit -m "update to ${VERSION}"
          git push
