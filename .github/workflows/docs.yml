name: Docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Resolve the canonical build image reference from .zigversion (ADR-019).
  # GitHub Actions cannot read a file inside a `container:` expression, so the
  # tag is computed once here and consumed via needs.image-ref.outputs.ref.
  # Mirrors the image-ref job in ci.yml — .zigversion stays the single source
  # of truth for the Zig version.
  image-ref:
    name: image-ref
    runs-on: ubuntu-22.04
    outputs:
      ref: ${{ steps.img.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image reference
        id: img
        run: |
          set -euo pipefail
          ver="$(head -n1 .zigversion | tr -d '[:space:]')"
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/${owner}/padctl-build:${ver}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-22.04
    needs: [image-ref]
    # Run inside the canonical build image (ADR-019): Zig + libusb + kernel
    # headers are baked in, so no setup-zig step or apt install is needed.
    container: ${{ needs.image-ref.outputs.ref }}
    # debian:bookworm-slim links /bin/sh to dash; force bash for run: steps.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Build padctl
        run: zig build

      - name: Validate all device configs
        run: |
          for f in devices/**/*.toml devices/*.toml; do
            [ -f "$f" ] || continue
            zig-out/bin/padctl --validate "$f"
          done

      - name: Generate device reference pages
        run: |
          mkdir -p docs/src/devices
          for f in devices/**/*.toml devices/*.toml; do
            [ -f "$f" ] || continue
            zig-out/bin/padctl --doc-gen --config "$f" --output docs/src/devices
          done

      - name: Build mdbook
        run: mdbook build docs/

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
